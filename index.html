<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jsonify</title>
  <link rel="icon" type="image/svg+xml" href="public/telep-io-logo-white.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --border: #0f3460;
      --text: #e0e0e0;
      --muted: #7a7a8e;
      --accent: #e94560;
      --string: #a8e6cf;
      --number: #ffd3a5;
      --bool: #ff8a80;
      --null: #7a7a8e;
      --key: #82b1ff;
      --bracket: #c792ea;
      --toggle: #555;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--accent); }

    header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0;
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    header a:hover { opacity: 1; }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel-header {
      padding: 8px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .divider {
      width: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    .editor-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .line-numbers {
      padding: 16px 8px 16px 12px;
      text-align: right;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
      overflow: hidden;
      flex-shrink: 0;
      user-select: none;
      min-width: 40px;
      border-right: 1px solid var(--border);
    }

    #input {
      flex: 1;
      background: transparent;
      color: var(--text);
      border: none;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    #input::placeholder { color: var(--muted); }

    #output {
      flex: 1;
      overflow: auto;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre;
    }

    .error {
      color: var(--accent);
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .error-pos {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    /* Syntax colors */
    .json-key { color: var(--key); }
    .json-string { color: var(--string); }
    .json-number { color: var(--number); }
    .json-bool { color: var(--bool); }
    .json-null { color: var(--null); font-style: italic; }
    .json-bracket { color: var(--bracket); }

    /* Collapsible */
    .json-toggle {
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .json-toggle::before {
      content: '▶';
      display: inline-block;
      width: 14px;
      font-size: 9px;
      color: var(--toggle);
      transition: transform 0.15s;
      transform: rotate(90deg);
    }

    .json-toggle.collapsed::before {
      transform: rotate(0deg);
    }

    .json-toggle:hover::before { color: var(--accent); }

    .json-collapsible {
      display: inline;
    }

    .json-collapsible.hidden { display: none; }

    .json-ellipsis { display: none; color: var(--muted); cursor: pointer; }
    .json-ellipsis:hover { color: var(--accent); }
    .json-toggle.collapsed + .json-ellipsis { display: inline; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 700px) {
      .container { flex-direction: column; }
      .divider { width: auto; height: 1px; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>{</span> jsonify <span>}</span> <a href="https://telep.io" target="_blank">by telep.io</a></h1>
    <div class="header-actions">
      <button id="btn-expand" title="Expand all">Expand All</button>
      <button id="btn-collapse" title="Collapse all">Collapse All</button>
      <button id="btn-copy" title="Copy beautified JSON">Copy</button>
      <button id="btn-clear" title="Clear input">Clear</button>
    </div>
  </header>

  <div class="container">
    <div class="panel">
      <div class="panel-header">Input</div>
      <div class="editor-wrap">
        <div class="line-numbers" id="input-lines">1</div>
        <textarea id="input" placeholder="Paste your JSON here..." spellcheck="false"></textarea>
      </div>
    </div>
    <div class="divider"></div>
    <div class="panel">
      <div class="panel-header">
        <span>Output</span>
        <span id="status"></span>
      </div>
      <div class="editor-wrap">
        <div class="line-numbers" id="output-lines"></div>
        <div id="output"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const toast = document.getElementById('toast');
    let debounceTimer;
    let parsedJSON = null;
    const inputLines = document.getElementById('input-lines');
    const outputLines = document.getElementById('output-lines');

    function updateLineNumbers(el, count) {
      const nums = [];
      for (let i = 1; i <= count; i++) nums.push(i);
      el.textContent = nums.join('\n');
    }

    function updateInputLineNumbers() {
      const count = input.value ? input.value.split('\n').length : 1;
      updateLineNumbers(inputLines, count);
    }

    function syncOutputLineNumbers() {
      const text = output.innerText;
      if (!text) { outputLines.textContent = ''; return; }
      updateLineNumbers(outputLines, text.split('\n').length);
    }

    input.addEventListener('scroll', () => {
      inputLines.scrollTop = input.scrollTop;
    });

    output.addEventListener('scroll', () => {
      outputLines.scrollTop = output.scrollTop;
    });

    input.addEventListener('input', () => {
      updateInputLineNumbers();
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(render, 150);
    });

    document.getElementById('btn-copy').addEventListener('click', () => {
      if (parsedJSON !== null) {
        navigator.clipboard.writeText(JSON.stringify(parsedJSON, null, 2))
          .then(() => showToast('Copied!'));
      }
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      input.value = '';
      output.innerHTML = '';
      status.textContent = '';
      parsedJSON = null;
      updateInputLineNumbers();
      outputLines.textContent = '';
    });

    document.getElementById('btn-expand').addEventListener('click', () => {
      output.querySelectorAll('.json-toggle.collapsed').forEach(el => {
        el.classList.remove('collapsed');
        const content = el.parentElement.querySelector('.json-collapsible');
        if (content) content.classList.remove('hidden');
      });
      syncOutputLineNumbers();
    });

    document.getElementById('btn-collapse').addEventListener('click', () => {
      output.querySelectorAll('.json-toggle:not(.collapsed)').forEach(el => {
        el.classList.add('collapsed');
        const content = el.parentElement.querySelector('.json-collapsible');
        if (content) content.classList.add('hidden');
      });
      syncOutputLineNumbers();
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function render() {
      const raw = input.value.trim();
      if (!raw) {
        output.innerHTML = '';
        status.textContent = '';
        parsedJSON = null;
        outputLines.textContent = '';
        return;
      }

      try {
        parsedJSON = JSON.parse(raw);
        const html = renderValue(parsedJSON, 0);
        output.innerHTML = html;
        bindToggles();

        syncOutputLineNumbers();

        const size = new Blob([raw]).size;
        status.textContent = formatSize(size);
      } catch (e) {
        parsedJSON = null;
        const match = e.message.match(/position (\d+)/);
        let posInfo = '';
        if (match) {
          const pos = parseInt(match[1]);
          const lines = raw.substring(0, pos).split('\n');
          const line = lines.length;
          const col = lines[lines.length - 1].length + 1;
          posInfo = `<div class="error-pos">Line ${line}, Column ${col}</div>`;
        }
        output.innerHTML = `<div class="error">${escapeHtml(e.message)}${posInfo}</div>`;
        status.textContent = 'Error';
        outputLines.textContent = '';
      }
    }

    function renderValue(val, indent) {
      if (val === null) return `<span class="json-null">null</span>`;
      if (typeof val === 'boolean') return `<span class="json-bool">${val}</span>`;
      if (typeof val === 'number') return `<span class="json-number">${val}</span>`;
      if (typeof val === 'string') return `<span class="json-string">"${escapeHtml(val)}"</span>`;

      const pad = '  '.repeat(indent);
      const padInner = '  '.repeat(indent + 1);

      if (Array.isArray(val)) {
        if (val.length === 0) return `<span class="json-bracket">[]</span>`;
        const items = val.map((v, i) => {
          const comma = i < val.length - 1 ? ',' : '';
          return `${padInner}${renderValue(v, indent + 1)}${comma}`;
        }).join('\n');

        return `<span class="json-node"><span class="json-toggle"></span><span class="json-bracket">[</span><span class="json-ellipsis"> ${val.length} items ]</span><span class="json-collapsible">\n${items}\n${pad}</span><span class="json-bracket">]</span></span>`;
      }

      if (typeof val === 'object') {
        const keys = Object.keys(val);
        if (keys.length === 0) return `<span class="json-bracket">{}</span>`;
        const entries = keys.map((k, i) => {
          const comma = i < keys.length - 1 ? ',' : '';
          return `${padInner}<span class="json-key">"${escapeHtml(k)}"</span>: ${renderValue(val[k], indent + 1)}${comma}`;
        }).join('\n');

        return `<span class="json-node"><span class="json-toggle"></span><span class="json-bracket">{</span><span class="json-ellipsis"> ${keys.length} keys }</span><span class="json-collapsible">\n${entries}\n${pad}</span><span class="json-bracket">}</span></span>`;
      }

      return escapeHtml(String(val));
    }

    function bindToggles() {
      output.querySelectorAll('.json-toggle').forEach(toggle => {
        toggle.addEventListener('click', () => {
          toggle.classList.toggle('collapsed');
          const content = toggle.parentElement.querySelector('.json-collapsible');
          if (content) content.classList.toggle('hidden');
          syncOutputLineNumbers();
        });
      });

      output.querySelectorAll('.json-ellipsis').forEach(el => {
        el.addEventListener('click', () => {
          const toggle = el.parentElement.querySelector('.json-toggle');
          if (toggle) {
            toggle.classList.remove('collapsed');
            const content = el.parentElement.querySelector('.json-collapsible');
            if (content) content.classList.remove('hidden');
            syncOutputLineNumbers();
          }
        });
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // Auto-parse on paste
    input.addEventListener('paste', () => {
      setTimeout(() => { updateInputLineNumbers(); render(); }, 0);
    });
  </script>
</body>
</html>
